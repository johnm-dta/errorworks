name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

# Serialize gh-pages writes — concurrent `mkdocs gh-deploy --force`
# invocations race the gh-pages branch and produce non-deterministic
# state on the published site.
concurrency:
  group: docs-deploy
  cancel-in-progress: false

env:
  UV_FROZEN: "1"
  UV_NO_PROGRESS: "1"

jobs:
  deploy:
    name: deploy gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # gh-deploy pushes to the gh-pages branch.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # gh-deploy needs history to push to gh-pages
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv sync --extra docs
      - run: cp CHANGELOG.md docs/changelog.md
      - run: uv run mkdocs gh-deploy --force --strict
