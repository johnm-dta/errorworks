name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security.yml"
  schedule:
    # Weekly catch-all so newly published CVEs in unchanged dependencies
    # still page someone. Monday 06:00 Sydney = 19:00 UTC Sunday.
    - cron: "0 19 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # CodeQL static analysis. Auto-builds for Python; results land in the
  # Security tab and gate via "Code scanning" branch protection if enabled.
  # ---------------------------------------------------------------------------
  codeql:
    name: codeql (python)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: github/codeql-action/init@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3
        with:
          category: "/language:python"

  # ---------------------------------------------------------------------------
  # pip-audit against the resolved dependency set. Runs offline against
  # the lockfile-equivalent state uv produces from pyproject.toml.
  # ---------------------------------------------------------------------------
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Resolve dependencies into requirements.txt
        run: |
          uv export \
            --all-extras \
            --no-hashes \
            --format requirements-txt \
            > /tmp/requirements.txt
      - name: Run pip-audit
        # On PRs, surface vulnerable deps as a warning rather than a hard
        # block — transitive-dep CVEs are pre-existing on main and fixed
        # by Dependabot, not the PR author. On main/schedule/dispatch the
        # step fails hard so newly introduced CVEs page someone.
        # --disable-pip would be ideal but requires hashed requirements;
        # uv export emits hashless, so we let pip-audit shell out to pip.
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          uvx --from pip-audit pip-audit \
            --requirement /tmp/requirements.txt \
            --strict
