version: 2
updates:
  # Python dependencies in pyproject.toml
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Australia/Sydney
    open-pull-requests-limit: 10
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch
      python-major:
        update-types:
          - major
    commit-message:
      prefix: "deps"
      include: scope
    labels:
      - dependencies
      - python

  # GitHub Actions (resolves the SHA pins back to fresh SHAs while
  # preserving the "# vN" version comments next to each `uses:`)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Australia/Sydney
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "ci"
      include: scope
    labels:
      - dependencies
      - github-actions
