# ChaosBlob Preset: stress_extreme
# Purpose: Maximum object-store stress for retry, timeout, and corruption handling.

server:
  host: "127.0.0.1"
  port: 8300
  workers: 1

metrics:
  database: "file:chaosblob-metrics?mode=memory&cache=shared"
  timeseries_bucket_sec: 1

storage:
  max_object_bytes: 10485760
  default_content_type: "application/octet-stream"

latency:
  base_ms: 600
  jitter_ms: 300

error_injection:
  slow_down_pct: 20.0
  access_denied_pct: 5.0
  not_found_pct: 5.0
  service_unavailable_pct: 8.0
  internal_error_pct: 4.0
  bad_gateway_pct: 3.0
  gateway_timeout_pct: 5.0
  retry_after_sec: [20, 120]

  timeout_pct: 8.0
  timeout_sec: [30, 90]
  connection_reset_pct: 5.0
  connection_stall_pct: 4.0
  connection_stall_start_sec: [0, 1]
  connection_stall_sec: [30, 60]
  slow_response_pct: 8.0
  slow_response_sec: [10, 30]

  truncated_body_pct: 6.0
  wrong_content_length_pct: 5.0
  checksum_mismatch_pct: 6.0
  metadata_corruption_pct: 4.0
  stale_list_pct: 8.0
  malformed_xml_pct: 4.0

  burst:
    enabled: true
    interval_sec: 30
    duration_sec: 8
    slow_down_pct: 90.0
    service_unavailable_pct: 60.0
