# ChaosBlob Preset: stress_storage
# Purpose: Storage-specific corruption, stale-list, and metadata resilience testing.

server:
  host: "127.0.0.1"
  port: 8300
  workers: 1

metrics:
  database: "file:chaosblob-metrics?mode=memory&cache=shared"
  timeseries_bucket_sec: 1

storage:
  max_object_bytes: 10485760
  default_content_type: "application/octet-stream"

latency:
  base_ms: 250
  jitter_ms: 150

error_injection:
  slow_down_pct: 8.0
  not_found_pct: 4.0
  retry_after_sec: [5, 45]

  slow_response_pct: 8.0
  slow_response_sec: [5, 20]

  truncated_body_pct: 8.0
  wrong_content_length_pct: 6.0
  checksum_mismatch_pct: 8.0
  metadata_corruption_pct: 6.0
  stale_list_pct: 12.0
  malformed_xml_pct: 4.0

  burst:
    enabled: true
    interval_sec: 60
    duration_sec: 12
    slow_down_pct: 60.0
    service_unavailable_pct: 20.0

